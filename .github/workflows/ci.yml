name: SDL_VPN CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Build Core Protocol
      run: cargo build --verbose -p core-protocol
    - name: Build Gateway
      run: cargo build --verbose -p gateway
    - name: Build Daemon
      run: cargo build --verbose -p daemon
    - name: Run tests
      run: cargo test --verbose --workspace --exclude nexusvpn-desktop
